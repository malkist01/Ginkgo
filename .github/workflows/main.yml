name: Anjani Kernel Build

on:
  workflow_dispatch:
    inputs:
      repository:
        description: 'Repository: owner/repo'
        required: true
        default: 'malkist01/Ginkgo'
      branch:
        description: 'Branch'
        required: true
        default: 'susfs'
      defconfig:
        description: 'Defconfig'
        required: true
        default: 'vendor/ginkgo_defconfig'
      clang_url:
        description: 'Clang URL'
        required: false
        default: 'git clone --depth=1 https://gitlab.com/PixelOS-Devices/playgroundtc -b 17 toolchain'

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        repository: ${{ github.event.inputs.repository }}
        ref: ${{ github.event.inputs.branch }}
        submodules: recursive

    - name: Install deps
      run: |
        sudo apt update
        sudo apt install -y build-essential libncurses-dev bison flex libssl-dev libelf-dev bc zip gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi python3 git wget

    - name: Clean
      run: |
        make mrproper 2>/dev/null || true
        make clean 2>/dev/null || true

    - name: Setup toolchain
      run: |
        if [[ "${{ github.event.inputs.clang_url }}" == git\ clone* ]]; then
          eval "${{ github.event.inputs.clang_url }}"
          if [ -d "toolchain" ]; then
            echo "$PWD/toolchain/bin" >> $GITHUB_PATH
          fi
        fi

    - name: Build
      run: |
        export ARCH="arm64"
        rm -rf out
        mkdir -p out
        
        make -j$(nproc) O=out ARCH=arm64 CC=clang LD=ld.lld AR=llvm-ar NM=llvm-nm STRIP=llvm-strip OBJCOPY=llvm-objcopy CROSS_COMPILE="aarch64-linux-gnu-" ${{ github.event.inputs.defconfig }} 2>&1 | tee defconfig.log
        
        make -j$(nproc) O=out ARCH=arm64 CC=clang LD=ld.lld AR=llvm-ar NM=llvm-nm STRIP=llvm-strip OBJCOPY=llvm-objcopy CROSS_COMPILE="aarch64-linux-gnu-" 2>&1 | tee compile.log

    - name: Package
      run: |
        REPO_NAME=$(echo "${{ github.event.inputs.repository }}" | cut -d'/' -f2)
        DATE=$(date +%Y%m%d)
        ZIP_NAME="kernel-$REPO_NAME-$DATE.zip"
        
        mkdir -p kernel-zip
        
        # Kernel
        if [ -f "out/arch/arm64/boot/Image.gz" ]; then
          cp "out/arch/arm64/boot/Image.gz" "kernel-zip/Image"
        elif [ -f "out/arch/arm64/boot/Image" ]; then
          cp "out/arch/arm64/boot/Image" "kernel-zip/Image"
        fi
        
        # DTB
        if [ -d "out/arch/arm64/boot/dts/vendor" ]; then
          mkdir -p kernel-zip/dtb
          find out/arch/arm64/boot/dts/vendor -name "*.dtb" -type f | head -10 | xargs -I {} cp {} "kernel-zip/dtb/"
        fi
        
        # DTBO
        if [ -f "out/arch/arm64/boot/dtbo.img" ]; then
          cp "out/arch/arm64/boot/dtbo.img" "kernel-zip/dtbo.img"
        fi
        
        cd kernel-zip
        zip -r9 "../$ZIP_NAME" .
        
        echo "Created: $ZIP_NAME"
        ls -la "../$ZIP_NAME"

    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: build
        path: |
          kernel-*.zip
          compile.log
          defconfig.log
        retention-days: 7

    - name: Done
      run: echo "Build complete"
