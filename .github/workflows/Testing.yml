name: KSU

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04

    strategy:
      fail-fast: false
      matrix:
        codename:
          - ginkgo

    env:
      TZ: Asia/Jakarta
      BOT_TOKEN : 8736261216:AAFhWrQl8vyavRExCYz857yx6s8WZvxbLqs
      CHAT_ID: -1002287610863
      KERNEL_VER: AnjaniLaurens
      KERNEL_BRANCH: main
      KERNEL_REPO: https://github.com/malkist01/ginkgo
      ANYKERNEL_REPO: https://github.com/malkist01/Anykernel3
      CLANG_URL: https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/4d2864f08ff2c290563fb903a5156e0504620bbe/clang-r563880c.tar.gz
      KSU_URL: https://raw.githubusercontent.com/Sorayukii/KernelSU-Next/stable/kernel/setup.sh
      KSU_BRANCH: hookless

    steps:
    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y \
          bc bison ca-certificates curl flex gcc git libc6-dev libssl-dev \
          openssl python-is-python3 ssh wget zip sudo make clang \
          gcc-arm-linux-gnueabi software-properties-common build-essential \
          libarchive-tools gcc-aarch64-linux-gnu libssl-dev libffi-dev \
          libncurses5-dev zlib1g zlib1g-dev libreadline-dev libbz2-dev \
          libsqlite3-dev make gcc pigz python3 cpio lld

    - name: Clone kernel source
      run: |
        git clone --depth=1 "$KERNEL_REPO" -b "$KERNEL_BRANCH" kernel
        cd kernel
        echo "KERNEL_DIR=$(pwd)" >> $GITHUB_ENV

    - name: Clone AnyKernel3
      run: |
        cd $KERNEL_DIR
        git clone --depth=1 -b "${{ matrix.codename }}" "$ANYKERNEL_REPO" AnyKernel3
        echo "ANYKERNEL_DIR=$KERNEL_DIR/AnyKernel3" >> $GITHUB_ENV

    - name: Downloading Aosp clang
      run: |
        cd $KERNEL_DIR
        CLANG_DIR="$KERNEL_DIR/clang"
        wget "$CLANG_URL" -O clang.tar.gz
        mkdir -p "$CLANG_DIR" && tar -xf clang.tar.gz -C "$CLANG_DIR"

    - name: Set up RKSU
      run: |
        cd $KERNEL_DIR
        curl -LSs "$KSU_URL" | bash -s $KSU_BRANCH

    - name: Build kernel
      run: |
        escape_markdown_v2() { 
            echo "$1" | sed -e 's/\\/\\\\/g' -e 's/_/\\_/g' -e 's/\*/\\*/g' -e 's/\[/\\[/g' -e 's/\]/\\]/g' -e 's/(/\\(/g' -e 's/)/\\)/g' -e 's/~/\\~/g' -e 's/`/\\`/g' -e 's/>/\\>/g' -e 's/#/\\#/g' -e 's/+/\\+/g' -e 's/-/\\-/g' -e 's/=/\\=/g' -e 's/|/\\|/g' -e 's/{/\\{/g' -e 's/}/\\}/g';
        }

        send_telegram_message() {
            local MESSAGE="$1"
            curl -s -X POST "https://api.telegram.org/bot$BOT_TOKEN/sendMessage" \
                -d "chat_id=$CHAT_ID" \
                -d "text=$MESSAGE"
        }

        send_telegram_file() {
            local FILE_PATH="$1"
            local FILE_NAME=$(basename "$FILE_PATH")
            local ESCAPED_NAME=$(escape_markdown_v2 "$FILE_NAME")
            local CAPTION="\`$ESCAPED_NAME\`"

            curl -s -X POST "https://api.telegram.org/bot$BOT_TOKEN/sendDocument" \
                -F "chat_id=$CHAT_ID" \
                -F "document=@$FILE_PATH" \
                -F "caption=$CAPTION" \
                -F "parse_mode=MarkdownV2"
        }

        stop_handler() {
          send_telegram_message "⚠️ Compilation was unexpectedly stopped!"
          [ -f "$LOG_FILE" ] && send_telegram_file "$LOG_FILE"
          exit 1
        }

        trap stop_handler ERR INT

        cd $KERNEL_DIR
        echo "CONFIG_KSU=y" >> ./arch/arm64/configs/vendor/ginkgo_defconfig
        echo "CONFIG_LTO_CLANG=y" >> ./arch/arm64/configs/vendor/ginkgo_defconfig
        echo "CONFIG_LTO_CLANG_THIN=y" >> ./arch/arm64/configs/vendor/ginkgo_defconfig
        echo "CONFIG_HAVE_LTO_CLANG=y" >> ./arch/arm64/configs/vendor/ginkgo_defconfig
        echo "CONFIG_CC_OPTIMIZE_FOR_PERFORMANCE=y" >> ./arch/arm64/configs/vendor/ginkgo_defconfig
        echo "CONFIG_MODVERSIONS=y" >> ./arch/arm64/configs/vendor/ginkgo_defconfig
        echo "CONFIG_KPROBES=n" >> ./arch/arm64/configs/vendor/ginkgo_defconfig
        echo "CONFIG_TMPFS_XATTR=y" >> ./arch/arm64/configs/vendor/ginkgo_defconfig
        echo "CONFIG_KSU_TAMPER_SYSCALL_TABLE=y" >> ./arch/arm64/configs/vendor/ginkgo_defconfig
        echo "CONFIG_KSU_EXTRAS=y" >> ./arch/arm64/configs/vendor/ginkgo_defconfig
        LOG_FILE=$KERNEL_DIR/build.log
        OUT_DIR=$KERNEL_DIR/out
        KERNEL_IMAGE_DIR=$OUT_DIR/arch/arm64/boot
        KERNEL_IMAGE=$KERNEL_IMAGE_DIR/Image.gz-dtb
        DTBO=$KERNEL_IMAGE_DIR/dtbo.img
        DEFCONFIG="vendor/ginkgo_defconfig"
        KERNEL_COMMIT_ID=$(git rev-parse --short=7 HEAD)
        ZIP_NAME="${KERNEL_VER}_${{ matrix.codename }}-allSU-$(date +%Y%m%d)-${KERNEL_COMMIT_ID}.zip"
        echo "ZIP_NAME=$ZIP_NAME" >> $GITHUB_ENV
        echo "LOG_FILE=$LOG_FILE" >> $GITHUB_ENV

        send_telegram_message "🔨 Starting kernel compilation for $CODENAME on branch $KERNEL_BRANCH"

        export KBUILD_BUILD_USER=ivy
        export KBUILD_BUILD_HOST="$KERNEL_COMMIT_ID"
        export DEFCONFIG
        export PATH="$CLANG_DIR/bin:$PATH"
        mkdir -p "$OUT_DIR"

        make O="$OUT_DIR" ARCH=arm64 "$DEFCONFIG"
        make -j$(nproc) O="$OUT_DIR" ARCH=arm64 \
          CC=clang LLVM=1 LLVM_IAS=1 LD=ld.lld AR=llvm-ar AS=llvm-as NM=llvm-nm \
          OBJCOPY=llvm-objcopy OBJDUMP=llvm-objdump STRIP=llvm-strip \
          CROSS_COMPILE=aarch64-linux-gnu- CROSS_COMPILE_ARM32=arm-linux-gnueabi- \
          2>&1 | tee -a "$LOG_FILE"

        BUILD_RESULT=${PIPESTATUS[0]}

        if [ "$BUILD_RESULT" -ne 0 ]; then
          send_telegram_message "❌ Compilation failed for ${{ matrix.codename }}!"
          send_telegram_file "$LOG_FILE"
          exit 1
        fi

        cp "$KERNEL_IMAGE" "$ANYKERNEL_DIR/Image.gz-dtb"
        cp "$DTBO" "$ANYKERNEL_DIR/dtbo.img"
        cd "$ANYKERNEL_DIR"
        zip -r9 "../$ZIP_NAME" ./* > /dev/null
        cd "$KERNEL_DIR"

        send_telegram_file "$ZIP_NAME"
        send_telegram_file "$LOG_FILE"
        send_telegram_message "✅ Compilation completed for ${{ matrix.codename }} Flashable zip is ready."

    - name: Upload kernel zip artifact
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.codename }}-${{ env.ZIP_NAME }}
        path: ${{ env.KERNEL_DIR }}/${{ env.ZIP_NAME }}

    - name: Upload build log artifact
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: build-log-${{ matrix.codename }}
        path: ${{ env.LOG_FILE }}
        
